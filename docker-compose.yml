services:
  db:
    image: postgres:16-alpine
    container_name: radar_puls_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: radar_puls
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d radar_puls"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: radar_puls_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/radar_puls
      DEVICE_TOKENS_JSON: '{"android_listener_01":"dev-token-01"}'
      TS_NODE_DEV: "true"
      TS_NODE_DEV_POLL: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run start:dev

volumes:
  postgres_data:
