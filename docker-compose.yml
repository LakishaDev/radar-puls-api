services:
  db:
    image: postgres:16-alpine
    container_name: radar_puls_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: radar_puls
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d radar_puls"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: radar_puls_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/radar_puls
      DEVICE_TOKENS_JSON: '{"android_listener_01":"dev-token-01"}'
      WORKER_BATCH_SIZE: 100
      WORKER_POLL_INTERVAL_MS: 5000
      WORKER_LEASE_TIMEOUT_MS: 300000
      WORKER_MAX_RETRIES: 3
      ENABLE_DEV_PROCESSING_TRIGGER: "true"
      PROCESSING_DEV_TRIGGER_TOKEN: "dev-processing-trigger-token"
      PARSER_VERSION: "v1.0"
      ENABLE_BACKFILL: "false"
      BACKFILL_TRIGGER_TOKEN: "dev-backfill-trigger-token"
      TS_NODE_DEV: "true"
      TS_NODE_DEV_POLL: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run start:dev

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: radar_puls_worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/radar_puls
      DEVICE_TOKENS_JSON: '{"android_listener_01":"dev-token-01"}'
      WORKER_BATCH_SIZE: 100
      WORKER_POLL_INTERVAL_MS: 5000
      WORKER_LEASE_TIMEOUT_MS: 300000
      WORKER_MAX_RETRIES: 3
      WORKER_INSTANCE_ID: "worker-1"
      ENABLE_DEV_PROCESSING_TRIGGER: "true"
      PROCESSING_DEV_TRIGGER_TOKEN: "dev-processing-trigger-token"
      PARSER_VERSION: "v1.0"
      ENABLE_BACKFILL: "false"
      BACKFILL_TRIGGER_TOKEN: "dev-backfill-trigger-token"
      TS_NODE_DEV: "true"
      TS_NODE_DEV_POLL: "true"
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run start:worker:dev

volumes:
  postgres_data:
