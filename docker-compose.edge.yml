services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - certbot_www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: >-
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/templates/radar-puls.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:v3.2.0
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    command: >-
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  certbot_www: